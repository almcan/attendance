<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - 休日設定</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .nav-links a {
            color: #1976d2;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* フォーム */
        .add-box {
            background: #e3f2fd;
            padding: 1.5rem;
            border-radius: 0.8rem;
            margin-bottom: 2rem;
        }

        .add-box h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .date-range {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 2;
        }

        input {
            padding: 0.6rem;
            border: 1px solid #ccc;
            border-radius: 0.4rem;
            font-family: inherit;
        }

        input[type="date"] {
            flex: 1;
            min-width: 140px;
        }

        input[type="text"] {
            flex: 1.5;
            min-width: 180px;
        }

        button.add-btn {
            background: #1976d2;
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-weight: 700;
        }

        button.add-btn:hover {
            background: #1565c0;
        }

        /* リスト */
        .holiday-list {
            list-style: none;
        }

        .holiday-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }

        .holiday-info {
            display: flex;
            gap: 1rem;
            align-items: baseline;
        }

        .holiday-date {
            font-weight: 700;
            color: #d32f2f;
            font-size: 0.95rem;
        }

        .holiday-name {
            font-size: 0.95rem;
        }

        button.del-btn {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            padding: 0.3rem 0.6rem;
            border-radius: 0.3rem;
            font-size: 0.8rem;
            cursor: pointer;
        }

        button.del-btn:hover {
            background: #ffcdd2;
        }

        .error {
            color: #d32f2f;
            background: #fdf2f2;
            padding: 0.8rem;
            border-radius: 0.4rem;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav-links">
            <a href="/calendar">← カレンダーに戻る</a> | <a href="/">座席表に戻る</a>
        </div>
        <h1>⚙️ 休日設定（管理画面）</h1>

        <div id="error-msg" class="error"></div>

        <div class="add-box">
            <h2>新しい休日を追加（期間指定も可能）</h2>
            <div class="form-row">
                <div class="date-range">
                    <input type="date" id="h-date" title="開始日">
                    <span>〜</span>
                    <input type="date" id="h-end-date" title="終了日（任意）">
                </div>
                <input type="text" id="h-name" placeholder="例: 夏休み">
                <button class="add-btn" onclick="addHoliday()">追加</button>
            </div>
            <p style="font-size:0.75rem;color:#666;margin-top:0.5rem;">※開始日のみ入力で1日、終了日も入力で範囲登録されます。</p>
        </div>

        <h3>登録済みのカスタム休日</h3>
        <ul id="holiday-list" class="holiday-list">
            <!-- JS で流し込み -->
        </ul>
    </div>

    <script>
        async function fetchHolidays() {
            try {
                const res = await fetch('/api/holidays');
                if (res.status === 403) {
                    showError('この画面は localhost（サーバーPC）からのみ操作可能です。');
                    return;
                }
                const data = await res.json();
                renderList(data);
            } catch (e) {
                showError('データの取得に失敗しました。');
            }
        }

        function renderList(list) {
            const container = document.getElementById('holiday-list');
            container.innerHTML = list.length === 0 ? '<p style="color:#888;padding:1rem;">登録されている休日はありません。</p>' : '';
            list.forEach(h => {
                const li = document.createElement('li');
                li.className = 'holiday-item';
                li.innerHTML = `
                    <div class="holiday-info">
                        <span class="holiday-date">${h.date}</span>
                        <span class="holiday-name">${h.name}</span>
                    </div>
                    <button class="del-btn" onclick="deleteHoliday('${h.date}')">削除</button>
                `;
                container.appendChild(li);
            });
        }

        async function addHoliday() {
            const date = document.getElementById('h-date').value;
            const endDate = document.getElementById('h-end-date').value;
            const name = document.getElementById('h-name').value;
            if (!date || !name) return;

            try {
                const res = await fetch('/api/holidays', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: date,
                        end_date: endDate || null,
                        name: name
                    })
                });
                if (res.ok) {
                    document.getElementById('h-date').value = '';
                    document.getElementById('h-end-date').value = '';
                    document.getElementById('h-name').value = '';
                    fetchHolidays();
                } else {
                    const data = await res.json();
                    showError(data.error || '追加に失敗しました。');
                }
            } catch (e) {
                showError('サーバーとの通信に失敗しました。');
            }
        }

        async function deleteHoliday(dateStr) {
            if (!confirm(`${dateStr} の休日設定を削除しますか？`)) return;
            try {
                const res = await fetch(`/api/holidays/${dateStr}`, { method: 'DELETE' });
                if (res.ok) fetchHolidays();
            } catch (e) {
                showError('削除に失敗しました。');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        fetchHolidays();
    </script>
</body>

</html>
