<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出席カレンダー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #f0f4f8;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* ─── ヘッダー ─── */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .header a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s;
        }

        .header a:hover {
            color: #fff;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 900;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .student-select {
            padding: 0.45rem 0.9rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            min-width: 140px;
        }

        .student-select:focus {
            border-color: rgba(255, 255, 255, 0.7);
        }

        .student-select option {
            background: #1a1a2e;
            color: #fff;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .admin-link {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 0.45rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .month-nav button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 0.45rem 0.9rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.2s;
        }

        .month-nav button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .month-label {
            font-size: 1.2rem;
            font-weight: 700;
            min-width: 110px;
            text-align: center;
        }

        /* ─── メイン ─── */
        .main {
            max-width: 1100px;
            margin: 1.8rem auto;
            padding: 0 1.2rem;
        }

        /* 凡例 */
        .legend {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 0.88rem;
            color: #555;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-dot.present {
            background: #43a047;
        }

        .filter-label {
            margin-left: auto;
            font-size: 0.88rem;
            color: #888;
        }

        .filter-label span {
            font-weight: 700;
            color: #1976d2;
        }

        /* ─── カレンダーグリッド ─── */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-header {
            text-align: center;
            font-weight: 700;
            font-size: 0.82rem;
            padding: 0.4rem 0;
            color: #666;
        }

        .day-header.sun {
            color: #e53935;
        }

        .day-header.sat {
            color: #1976d2;
        }

        .day-cell {
            background: #fff;
            border-radius: 0.7rem;
            padding: 0.4rem 0.4rem;
            min-height: 90px;
            border: 2px solid #e8eaed;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .day-cell:hover {
            border-color: #90caf9;
            box-shadow: 0 2px 10px rgba(25, 118, 210, 0.15);
        }

        .day-cell.empty {
            background: transparent;
            border: none;
            cursor: default;
            pointer-events: none;
        }

        .day-cell.today {
            border-color: #1976d2;
        }

        .day-cell.weekend-sun {
            background: #fff5f5;
        }

        .day-cell.weekend-sat {
            background: #f0f4ff;
        }

        .day-cell.holiday {
            background: #ffebee;
        }

        /* フィルター強調 */
        .day-cell.filter-match {
            border-color: #43a047 !important;
            background: #f1f8e9;
        }

        .day-cell.filter-no-match {
            opacity: 0.35;
        }

        .day-num {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #333;
            display: flex;
            align-items: center;
        }

        .day-num .today-badge {
            width: 23px;
            height: 23px;
            border-radius: 50%;
            background: #1976d2;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
        }

        .day-cell.holiday .day-num {
            color: #d32f2f;
        }

        .day-cell.weekend-sun .day-num {
            color: #e53935;
        }

        .day-cell.weekend-sat .day-num {
            color: #1976d2;
        }

        .holiday-name {
            font-size: 0.6rem;
            color: #d32f2f;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
            margin-left: 4px;
        }

        /* ─── 名前タグ（横並びコンパクト） ─── */
        .name-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .name-tag {
            display: inline-block;
            padding: 1px 5px;
            background: #43a047;
            color: #fff;
            border-radius: 99px;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .name-tag.filter-main {
            font-size: 0.8rem;
            padding: 3px 9px;
        }

        /* ─── 詳細パネル ─── */
        .detail-panel {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .detail-panel.active {
            display: flex;
        }

        .detail-card {
            background: #fff;
            border-radius: 1rem;
            padding: 2rem;
            min-width: 320px;
            max-width: 460px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .detail-card h2 {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 1.2rem;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table th {
            text-align: left;
            font-size: 0.78rem;
            color: #888;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-table td {
            padding: 0.5rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #f5f5f5;
        }

        .detail-table td:first-child {
            font-weight: 700;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .badge.came {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge.remote {
            background: #e3f2fd;
            color: #1565c0;
        }

        .badge.absent {
            background: #f5f5f5;
            color: #9e9e9e;
        }

        .badge.is-absent {
            background: #ffebee;
            color: #d32f2f;
        }

        .close-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.65rem;
            border: none;
            border-radius: 0.5rem;
            background: #e0e0e0;
            color: #555;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
        }

        .close-btn:hover {
            background: #bdbdbd;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: #888;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="/">← 座席表</a>
        <h1>📅 出席カレンダー</h1>
        <div class="header-controls">
            <select class="student-select" id="student-filter" onchange="applyFilter()">
                <option value="">全員を表示</option>
            </select>
            <div class="month-nav">
                <a href="/admin" class="admin-link">⚙️ 休日設定</a>
                <button onclick="changeMonth(-1)">&#8249;</button>
                <span class="month-label" id="month-label">---</span>
                <button onclick="changeMonth(1)">&#8250;</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot present"></div>出席
            </div>
            <div class="legend-item">
                <div style="width:12px;height:12px;border-radius:50%;background:#1e88e5;flex-shrink:0;"></div>リモート中
            </div>
            <div class="legend-item">
                <div style="color:#d32f2f;font-weight:700;font-size:1rem;">●</div>祝日・休日
            </div>
            <div class="filter-label" id="filter-label"></div>
        </div>
        <div id="calendar-container" class="loading">読み込み中...</div>
    </div>

    <!-- 詳細パネル -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-card">
            <h2 id="detail-title"></h2>
            <table class="detail-table">
                <thead>
                    <tr>
                        <th>氏名</th>
                        <th>状態</th>
                    </tr>
                </thead>
                <tbody id="detail-body"></tbody>
            </table>
            <button class="close-btn" onclick="closeDetail()">閉じる</button>
        </div>
    </div>

    <script>
        let currentYear, currentMonth;
        let calendarData = null;
        let selectedStudent = '';

        function init() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth() + 1;
            load();
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 12) { currentMonth = 1; currentYear++; }
            if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            load();
        }

        async function load() {
            document.getElementById('calendar-container').innerHTML = '<div class="loading">読み込み中...</div>';
            document.getElementById('month-label').textContent = `${currentYear}年 ${currentMonth}月`;

            const res = await fetch(`/api/calendar?year=${currentYear}&month=${currentMonth}`);
            calendarData = await res.json();

            // 学生セレクト更新
            const sel = document.getElementById('student-filter');
            const prev = sel.value;
            sel.innerHTML = '<option value="">全員を表示</option>';
            calendarData.students.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === prev) opt.selected = true;
                sel.appendChild(opt);
            });
            selectedStudent = sel.value;

            render();
        }

        function applyFilter() {
            selectedStudent = document.getElementById('student-filter').value;
            render();
        }

        // 名字（先頭2文字）を返す
        function surname(name) {
            return name.slice(0, 2);
        }

        // 出席・退席・リモート中いずれも「来た」とみなす
        function cameThatDay(status) {
            return status === '出席' || status === '退席' || status === 'リモート中';
        }

        function render() {
            if (!calendarData) return;
            const { year, month, students, daily } = calendarData;
            const container = document.getElementById('calendar-container');

            const firstDow = new Date(year, month - 1, 1).getDay();
            const daysInMonth = Object.keys(daily).length;
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            const filterLabel = document.getElementById('filter-label');
            filterLabel.innerHTML = selectedStudent
                ? `絞り込み中: <span>${selectedStudent}</span>` : '';

            let html = '<div class="calendar-grid">';

            ['日', '月', '火', '水', '木', '金', '土'].forEach((d, i) => {
                const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
                html += `<div class="day-header ${cls}">${d}</div>`;
            });

            for (let i = 0; i < firstDow; i++) {
                html += '<div class="day-cell empty"></div>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dow = (firstDow + d - 1) % 7;
                const isToday = dateStr === todayStr;
                const dayData = daily[dateStr] || {};
                const holidayName = calendarData.holidays[dateStr];

                let cls = 'day-cell';
                if (dow === 0) cls += ' weekend-sun';
                if (dow === 6) cls += ' weekend-sat';
                if (holidayName) cls += ' holiday';
                if (isToday) cls += ' today';

                if (selectedStudent) {
                    if (cameThatDay(dayData[selectedStudent])) {
                        cls += ' filter-match';
                    } else {
                        cls += ' filter-no-match';
                    }
                }

                const dayNumHtml = isToday
                    ? `<div class="day-num"><div class="today-badge">${d}</div>${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}</div>`
                    : `<div class="day-num">${d}${holidayName ? `<span class="holiday-name">${holidayName}</span>` : ''}</div>`;

                // 名前タグ表示（名字のみ）
                let namesHtml = '';
                if (selectedStudent) {
                    if (cameThatDay(dayData[selectedStudent])) {
                        namesHtml = `<div class="name-tag filter-main" title="${selectedStudent}">${surname(selectedStudent)}</div>`;
                    }
                } else {
                    namesHtml = students
                        .filter(n => cameThatDay(dayData[n]))
                        .map(name => `<div class="name-tag" title="${name}">${surname(name)}</div>`)
                        .join('');
                }

                html += `<div class="${cls}" onclick="openDetail('${dateStr}')">
                ${dayNumHtml}
                <div class="name-tags">${namesHtml}</div>
            </div>`;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function openDetail(dateStr) {
            if (!calendarData) return;
            const { students, daily } = calendarData;
            const dayData = daily[dateStr] || {};

            const dt = new Date(dateStr + 'T00:00:00');
            const dowNames = ['日', '月', '火', '水', '木', '金', '土'];
            const holidayName = calendarData.holidays[dateStr];
            document.getElementById('detail-title').textContent =
                `${dt.getMonth() + 1}月${dt.getDate()}日（${dowNames[dt.getDay()]}）${holidayName ? ` - ${holidayName}` : ''}`;

            const targets = selectedStudent ? [selectedStudent] : students;

            let rows = '';
            targets.forEach(name => {
                const status = dayData[name];
                const came = cameThatDay(status);
                let badgeCls = 'absent';
                let dotColor = 'transparent';
                let label = '—';
                
                if (status === '出席') {
                    badgeCls = 'came';
                    dotColor = '#43a047';
                    label = '出席';
                } else if (status === 'リモート中') {
                    badgeCls = 'remote';
                    dotColor = '#1e88e5';
                    label = 'リモート中';
                } else if (came && status === '退席') {
                    // 退席記録があるが出席記録がない等のレアケース
                    badgeCls = 'came';
                    dotColor = '#43a047';
                    label = '退席';
                } else if (status === '欠席') {
                    badgeCls = 'is-absent';
                    dotColor = '#d32f2f';
                    label = '欠席';
                }

                const dot = (came || status === '欠席')
                    ? `<div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>`
                    : '';
                rows += `<tr>
                <td>${name}</td>
                <td><span class="badge ${badgeCls}">${dot}${label}</span></td>
            </tr>`;
            });

            document.getElementById('detail-body').innerHTML = rows;
            document.getElementById('detail-panel').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('active');
        }

        document.getElementById('detail-panel').addEventListener('click', function (e) {
            if (e.target === this) closeDetail();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeDetail();
        });

        init();
    </script>

</body>

</html>
